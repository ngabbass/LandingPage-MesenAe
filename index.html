<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- ========================================== -->
    <!-- 1. PRIMARY META TAGS (SEO DASAR)           -->
    <!-- ========================================== -->
    <title>Mesen.Ae — Aplikasi Point Of Sale & Self-Order Modern</title>
    <meta name="title" content="Mesen.Ae — Aplikasi Point Of Sale & Self-Order Modern" />
    <meta name="description" content="Tingkatkan efisiensi operasional bisnis F&B Anda dengan Mesen.Ae. Sistem kasir POS cloud cerdas lengkap dengan fitur QR Menu, manajemen shift, dan laporan real-time." />
    <meta name="keywords" content="aplikasi kasir, POS F&B, point of sale restoran, QR menu, self-order, software kasir cafe, kasir online, manajemen restoran" />
    <meta name="author" content="Mesen.Ae" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="Indonesian" />
    
    <!-- Theme color untuk tampilan mobile browser (Sesuaikan dengan warna brand/amber) -->
    <meta name="theme-color" content="#080D1A" />
    
    <!-- Canonical URL untuk menghindari penalti duplikasi konten dari Google -->
    <link rel="canonical" href="https://mesenae.web.app/" />

    <!-- ========================================== -->
    <!-- 2. ICONS & MANIFEST                        -->
    <!-- ========================================== -->
    <link rel="icon" type="image/png" href="/assets/mesenae.png" />
    <!-- Apple Touch Icon (Untuk icon saat disave ke Homescreen iOS) -->
    <link rel="apple-touch-icon" href="/assets/mesenae-apple-touch.png" />
    
    <!-- ========================================== -->
    <!-- 3. OPEN GRAPH (FACEBOOK, WHATSAPP, LINKEDIN) -->
    <!-- ========================================== -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mesenae.web.app/" />
    <meta property="og:title" content="Mesen.Ae — Aplikasi Point Of Sale & Self-Order Modern" />
    <meta property="og:description" content="Tingkatkan efisiensi operasional bisnis F&B Anda dengan Mesen.Ae. Sistem kasir POS cerdas dengan fitur QR Menu dan laporan real-time." />
    <!-- Rekomendasi rasio gambar OG: 1200x630 pixels -->
    <meta property="og:image" content="https://mesenae.web.app/og-image.png" />
    <meta property="og:site_name" content="Mesen.Ae" />
    <meta property="og:locale" content="id_ID" />

    <!-- ========================================== -->
    <!-- 4. TWITTER CARDS                           -->
    <!-- ========================================== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://mesenae.web.app/" />
    <meta name="twitter:title" content="Mesen.Ae — Aplikasi Point Of Sale & Self-Order Modern" />
    <meta name="twitter:description" content="Sistem kasir POS cerdas lengkap dengan fitur QR Menu, manajemen shift, dan laporan real-time untuk bisnis F&B." />
    <meta name="twitter:image" content="https://mesenae.web.app/assets/twitter-image.jpg" />

    <!-- ========================================== -->
    <!-- 5. PRECONNECT & OPTIMASI PERFORMA (Opsional) -->
    <!-- ========================================== -->
    <!-- Mempercepat load Google Fonts atau API pihak ketiga -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ========================================== -->
    <!-- 6. SCHEMA ORG / JSON-LD (RICH SNIPPETS GOOGLE) -->
    <!-- ========================================== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Mesen.Ae",
        "operatingSystem": "Web, Android, iOS",
        "applicationCategory": "BusinessApplication",
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.8",
          "ratingCount": "125"
        },
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "IDR"
        },
        "description": "Aplikasi kasir Point of Sale (POS) dan Self-Order berbasis cloud untuk efisiensi bisnis F&B, Cafe, dan Restoran di Indonesia."
      }
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
